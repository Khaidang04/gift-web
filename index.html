<!DOCTYPE html>
<html lang="vi">
<head>
<link rel="icon" href="icon.ico">
<link rel="apple-touch-icon" href="icon.ico">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> XÁC NHẬN PHẦN THƯỞNG </title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:'Segoe UI';
    color:white;
    text-align:center;
    overflow:hidden;

    background:linear-gradient(270deg,#000,#001a1a,#000033,#000);
    background-size:600% 600%;
    animation:bg 8s linear infinite;
}

@keyframes bg{
    0%{background-position:0%}
    50%{background-position:100%}
    100%{background-position:0%}
}

/* container */
.container{
    position:relative;
    z-index:2;
    margin-top:60px;
    padding:0 10px;
}

/* icon */
.icon{
    font-size:60px;
    animation:float 2s infinite;
    text-shadow:0 0 20px gold;
}

@keyframes float{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-12px)}
}

/* title */
.title{
    font-size:26px;
    font-weight:700;
    margin-top:10px;
    text-shadow:0 0 10px #00ffff;
}

.title span{color:#ff3b3b}

/* ===== LOG ===== */
.log{
    margin:20px auto;
    width:340px;
    max-width:95%;
    height:140px;
    overflow:hidden;
    border-radius:12px;
    background:#000;
    border:1px solid rgba(0,255,255,0.3);
}

.log-track{
    animation:scroll 30s linear infinite;
}

.log-item{
    display:flex;
    justify-content:space-between;
    padding:10px 12px;
    border-bottom:1px dashed rgba(255,255,255,0.15);
    text-align:left;
}

/* text */
.name{
    color:#4dabff;
    font-size:14px;
    font-weight:600;
    text-shadow:0 0 6px #4dabff;
}

.action{
    font-weight:700;
    color:#00ff88;
    font-size:14px;
    text-shadow:0 0 6px #00ff88;
}

.time{
    color:#aaa;
    font-size:12px;
}

/* ===== CHECKBOX ===== */
.checkbox{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin-top:20px;
    cursor:pointer;
    padding:10px;
}

.checkbox input{display:none;}

.checkmark{
    width:26px;height:26px;
    border-radius:8px;
    border:2px solid #00c6ff;
    display:flex;
    align-items:center;
    justify-content:center;
}

.checkmark::after{
    content:"✔";
    opacity:0;
}

.checkbox input:checked + .checkmark{
    background:linear-gradient(90deg,#00c6ff,#0072ff);
    box-shadow:0 0 10px #00c6ff;
}

.checkbox input:checked + .checkmark::after{
    opacity:1;
}

/* button */
button{
    margin-top:20px;
    width:320px;
    max-width:100%;
    padding:15px;
    border-radius:50px;
    border:none;
    font-size:18px;
    background:#111;
    color:#555;
    cursor:not-allowed;
}

button.active{
    background:linear-gradient(90deg,#00c6ff,#0072ff);
    color:white;
    box-shadow:0 0 20px #00c6ff;
    cursor:pointer;
}

/* ===== EFFECT LAYER ===== */
#particles,#gifts{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index:1;
}

/* particles */
.particle{
    position:absolute;
    width:3px;height:3px;
    background:#00ffff;
    box-shadow:0 0 15px #00ffff;
    animation:move linear infinite;
}

@keyframes move{
    from{transform:translateY(100vh)}
    to{transform:translateY(-10vh)}
}

/* gift */
.gift{
    position:absolute;
    font-size:24px;
    filter:drop-shadow(0 0 10px gold);
    animation:fly linear infinite;
}

@keyframes fly{
    from{transform:translateY(100vh)}
    to{transform:translateY(-10vh)}
}

/* scroll */
@keyframes scroll{
    from{transform:translateY(0)}
    to{transform:translateY(-50%)}
}

/* mobile */
@media(max-width:480px){
    .title{font-size:22px}
    .icon{font-size:45px}
}
</style>
</head>

<body>

<div id="particles"></div>
<div id="gifts"></div>

<div class="container">
    <div class="icon">🎁</div>

    <div class="title">
        CHÀO MỪNG ĐẾN <br>
        <span>CỔNG QUÀ VIP</span>
    </div>

    <div class="log">
        <div class="log-track" id="logTrack"></div>
    </div>

    <label class="checkbox">
        <input type="checkbox" id="agree">
        <span class="checkmark"></span>
        Tôi xác nhận đủ 18 tuổi
    </label>

    <button id="btn">ĐĂNG KÝ NGAY</button>
</div>

<script>
const btn=document.getElementById("btn");
const agree=document.getElementById("agree");

agree.onchange=()=>{
    btn.classList.toggle("active",agree.checked);
};

btn.onclick=()=>{
    if(!agree.checked)return;
    btn.innerText="ĐANG XỬ LÝ...";
    setTimeout(()=>location.href="loading.html",800);
};

/* ===== LOG ===== */
const logTrack=document.getElementById("logTrack");

const baseNames=["babu","monk","vip","king","alex","tony","huy","nam"];
const actions=["Vừa Thắng Lớn","Vừa Rút 1Tr","Vừa Nạp 500K","Trúng VIP"];

function randomName(){
    return baseNames[Math.floor(Math.random()*baseNames.length)] 
    + Math.floor(Math.random()*9999) + "...";
}

/* time tăng dần chuẩn */
function generateTimes(count){
    let times=[];
    let t=1;
    for(let i=0;i<count;i++){
        times.push(t+"p trước");
        t+=Math.floor(Math.random()*2);
    }
    return times;
}

function createItem(time){
    return `
    <div class="log-item">
        <div>
            <div class="name">${randomName()}</div>
            <div class="action">${actions[Math.floor(Math.random()*actions.length)]}</div>
        </div>
        <div class="time">${time}</div>
    </div>
    `;
}

let html="";
const times=generateTimes(20);

for(let i=0;i<20;i++){
    html+=createItem(times[i]);
}

logTrack.innerHTML=html+html;

/* PARTICLES */
const p=document.getElementById("particles");
setInterval(()=>{
    const dot=document.createElement("div");
    dot.className="particle";
    dot.style.left=Math.random()*100+"%";
    dot.style.animationDuration=(3+Math.random()*5)+"s";
    p.appendChild(dot);
    setTimeout(()=>dot.remove(),8000);
},40);

/* GIFTS */
const g=document.getElementById("gifts");
setInterval(()=>{
    const gift=document.createElement("div");
    gift.className="gift";
    gift.innerHTML="🎁";
    gift.style.left=Math.random()*100+"%";
    gift.style.animationDuration=(4+Math.random()*4)+"s";
    g.appendChild(gift);
    setTimeout(()=>gift.remove(),8000);
},150);
</script>

</body>
</html>

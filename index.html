<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cổng quà VIP</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:'Segoe UI';
    color:white;
    text-align:center;
    overflow:hidden;

    background:linear-gradient(270deg,#000,#001a1a,#000033,#000);
    background-size:600% 600%;
    animation:bg 12s ease infinite;
}

@keyframes bg{
    0%{background-position:0%}
    50%{background-position:100%}
    100%{background-position:0%}
}

/* container */
.container{
    position:relative;
    z-index:2;
    margin-top:60px;
    padding:0 10px;
}

/* icon */
.icon{
    font-size:60px;
    animation:float 2s infinite;
    text-shadow:0 0 20px gold;
}

/* title */
.title{
    font-size:26px;
    font-weight:700;
    margin-top:10px;
    text-shadow:0 0 10px #00ffff;
}

.title span{color:#ff3b3b}

/* ===== LOG MƯỢT ===== */
.log{
    margin:25px auto;
    width:340px;
    max-width:95%;
    height:150px;
    overflow:hidden;
    border-radius:12px;
    background:rgba(0,0,0,0.4);
    border:1px solid rgba(0,255,255,0.3);
    position:relative;
}

.log-track{
    position:absolute;
    width:100%;
    animation:scrollUp 40s linear infinite;
}

.log-item{
    display:flex;
    justify-content:space-between;
    padding:10px;
    border-bottom:1px dashed rgba(255,255,255,0.1);
}

.left{
    display:flex;
    gap:10px;
    align-items:center;
}

.avatar{
    width:32px;height:32px;border-radius:50%;
}

/* text */
.name{color:#00ccff;font-size:13px}
.action{color:#00ff99;font-size:13px}
.time{color:#aaa;font-size:12px}

/* scroll animation */
@keyframes scrollUp{
    0%{transform:translateY(0)}
    100%{transform:translateY(-50%)}
}

/* ===== CHECKBOX ===== */
.checkbox{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin-top:20px;
    cursor:pointer;
    padding:10px;
}

.checkbox input{display:none;}

.checkmark{
    width:26px;height:26px;
    border-radius:8px;
    border:2px solid #00c6ff;
    display:flex;
    align-items:center;
    justify-content:center;
}

.checkmark::after{
    content:"✔";
    opacity:0;
}

.checkbox input:checked + .checkmark{
    background:linear-gradient(90deg,#00c6ff,#0072ff);
    box-shadow:0 0 10px #00c6ff;
}

.checkbox input:checked + .checkmark::after{
    opacity:1;
}

/* button */
button{
    margin-top:20px;
    width:320px;
    max-width:100%;
    padding:15px;
    border-radius:50px;
    border:none;
    font-size:18px;
    background:#111;
    color:#555;
    cursor:not-allowed;
}

button.active{
    background:linear-gradient(90deg,#00c6ff,#0072ff);
    color:white;
    box-shadow:0 0 20px #00c6ff;
    cursor:pointer;
}

/* ===== PARTICLES ===== */
.particle{
    position:absolute;
    width:3px;height:3px;
    background:#00ffff;
    box-shadow:0 0 10px #00ffff;
    animation:move linear infinite;
}

@keyframes move{
    from{transform:translateY(100vh)}
    to{transform:translateY(-10vh)}
}

/* ===== GIFTS ===== */
.gift{
    position:absolute;
    font-size:26px;
    animation:fly linear infinite;
}

@keyframes fly{
    from{transform:translateY(100vh)}
    to{transform:translateY(-10vh)}
}

/* ===== MOBILE ===== */
@media(max-width:480px){
    .title{font-size:22px}
    .icon{font-size:45px}
}
</style>
</head>

<body>

<div id="particles"></div>
<div id="gifts"></div>

<div class="container">
    <div class="icon">🎁</div>

    <div class="title">
        CHÀO MỪNG ĐẾN <br>
        <span>CỔNG QUÀ VIP</span>
    </div>

    <!-- LOG -->
    <div class="log">
        <div class="log-track" id="logTrack"></div>
    </div>

    <!-- CHECKBOX -->
    <label class="checkbox">
        <input type="checkbox" id="agree">
        <span class="checkmark"></span>
        Tôi xác nhận đủ 18 tuổi
    </label>

    <button id="btn">ĐĂNG KÝ NGAY</button>
</div>

<script>
const btn=document.getElementById("btn");
const checkbox=document.getElementById("agree");

checkbox.onchange=()=>{
    btn.classList.toggle("active",checkbox.checked);
};

btn.onclick=()=>{
    if(!checkbox.checked)return;
    btn.innerText="ĐANG XỬ LÝ...";
    setTimeout(()=>location.href="loading.html",800);
};

/* ===== LOG MƯỢT ===== */
const logTrack=document.getElementById("logTrack");

const actions=["Thắng lớn","Rút 1Tr","Nạp 500K","Trúng VIP"];

function avatar(){
    return "https://i.pravatar.cc/150?img="+Math.floor(Math.random()*70);
}

function createItem(){
    return `
    <div class="log-item">
        <div class="left">
            <img class="avatar" src="${avatar()}"/>
            <div>
                <div class="name">user${Math.floor(Math.random()*9999)}</div>
                <div class="action">${actions[Math.floor(Math.random()*actions.length)]}</div>
            </div>
        </div>
        <div class="time">${Math.floor(Math.random()*3+1)}p</div>
    </div>
    `;
}

let html="";
for(let i=0;i<20;i++){
    html+=createItem();
}
logTrack.innerHTML=html+html;

/* PARTICLES */
const p=document.getElementById("particles");
setInterval(()=>{
    const dot=document.createElement("div");
    dot.className="particle";
    dot.style.left=Math.random()*100+"%";
    dot.style.animationDuration=(3+Math.random()*5)+"s";
    p.appendChild(dot);
    setTimeout(()=>dot.remove(),8000);
},100);

/* GIFTS */
const g=document.getElementById("gifts");
setInterval(()=>{
    const gift=document.createElement("div");
    gift.className="gift";
    gift.innerHTML="🎁";
    gift.style.left=Math.random()*100+"%";
    gift.style.animationDuration=(4+Math.random()*4)+"s";
    g.appendChild(gift);
    setTimeout(()=>gift.remove(),8000);
},400);
</script>

</body>
</html>
